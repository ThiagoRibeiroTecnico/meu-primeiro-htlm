<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scal([informaticawt.com.br](https://informaticawt.com.br/))tle>Thiago Ribeiro Eletrônica e Informática</title>
  <meta name="description" content="Assistência técnica especializada em notebook, TV, monitores, celulares, impressoras, redes, servidores e manutenção eletrônica em Londrina." />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(1140px, calc(100% - 32px));
      margin: 0 auto;
    }

    .top-info {
      background: #0f172a;
      color: #e5e7eb;
      font-size: 14px;
    }

    .top-info .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    .main-header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2563eb, #22c55e);
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    .brand-text h1 {
      font-size: 20px;
      color: #0f172a;
      line-height: 1.1;
    }

    .brand-text p {
      font-size: 13px;
      color: #64748b;
    }

    .menu-toggle {
      display: none;
      border: 1px solid #cbd5e1;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .menu a {
      color: #334155;
      font-weight: 600;
      transition: 0.2s;
    }

    .menu a:hover {
      color: #2563eb;
    }

    .btn-whats {
      background: #22c55e;
      color: white !important;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
    }

    .hero {
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      padding: 70px 0;
    }
